<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auth System</title>

<link rel="stylesheet" href="style.css">
<script src="script.js" defer></script>

</head>
<body>

<!-- LOGIN PAGE -->
<div class="box show" id="loginPage">
    <h2>Login</h2>

    <input type="email" id="loginEmail" placeholder="Enter Email">

    <div class="password-box">
        <input type="password" id="loginPass" maxlength="4" placeholder="4-digit Password">
        <span class="toggle" onclick="toggle('loginPass')">👁️</span>
    </div>

    <button onclick="login()">Login</button>

    <a onclick="switchPage('registerPage')" style="cursor:pointer;color:white;">
        Create Account
    </a>
</div>


<!-- REGISTER PAGE -->
<div class="box" id="registerPage">
    <h2>Create Account</h2>

    <input type="email" id="regEmail" placeholder="Enter Email">

    <div class="password-box">
        <input type="password" id="regPass" maxlength="4" placeholder="4-digit Password" onkeyup="checkStrength()">
        <span class="toggle" onclick="toggle('regPass')">👁️</span>
    </div>

    <div id="strength"></div>

    <button onclick="register()">Register</button>

    <a onclick="switchPage('loginPage')" style="cursor:pointer;color:white;">
        Back to Login
    </a>
</div>


<!-- SUCCESS PAGE -->
<div class="box" id="successPage">
    <div class="success-msg">🎉 Login Successful!</div>
    <p>Redirecting...</p>
</div>


<!-- DASHBOARD PAGE -->
<div class="box" id="dashboardPage">
    <h2>Dashboard</h2>
    <p id="userInfo"></p>
    <button onclick="logout()">Logout</button>
</div>

</body>
</html>
